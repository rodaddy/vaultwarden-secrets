# Nginx configuration for mTLS (mutual TLS) with vaultwarden-secrets
# This config validates client certificates and passes the fingerprint to the app

upstream vaultwarden_secrets {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name secrets.local;  # Change to your domain

    # Server certificate (presented to clients)
    ssl_certificate /opt/vaultwarden-secrets/tls/server.crt;
    ssl_certificate_key /opt/vaultwarden-secrets/tls/server.key;

    # Client certificate validation
    ssl_client_certificate /opt/vaultwarden-secrets/tls/ca.crt;
    ssl_verify_client on;  # Require client certificate
    ssl_verify_depth 1;    # Only trust certs signed by our CA

    # TLS security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Access log with client cert info
    access_log /var/log/nginx/secrets-access.log combined;
    error_log /var/log/nginx/secrets-error.log warn;

    location / {
        proxy_pass http://vaultwarden_secrets;
        proxy_http_version 1.1;

        # Pass client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Pass client certificate fingerprint
        # This is what vaultwarden-secrets validates against allowlist
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;

        # Optional: Pass additional cert info for logging
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Keepalive
        proxy_set_header Connection "";
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass http://vaultwarden_secrets;
        access_log off;
    }
}

# Optional: Redirect HTTP to HTTPS
server {
    listen 80;
    server_name secrets.local;
    return 301 https://$server_name$request_uri;
}
