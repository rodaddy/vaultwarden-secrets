name: Security Scan

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  betterleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    env:
      BETTERLEAKS_SHA256: fbefc700a0bd4522cc952dd2a8f259cdb80526d7e60114aca19bb2d6fdc80f81
      BETTERLEAKS_VERSION: 1.6.1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz"
          archive_path="${RUNNER_TEMP}/${archive}"
          install_dir="${RUNNER_TEMP}/betterleaks-bin"
          download_url="https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/${archive}"

          curl --fail --location --silent --show-error --output "${archive_path}" "${download_url}"
          echo "${BETTERLEAKS_SHA256}  ${archive_path}" | sha256sum --check --strict
          mkdir -p "${install_dir}"
          tar -xzf "${archive_path}" -C "${install_dir}" betterleaks
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Scan changed commits
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            scan_range="${BASE_SHA}..${HEAD_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            scan_range="${BEFORE_SHA}..${HEAD_SHA}"
          elif git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
            scan_range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            scan_range="${HEAD_SHA}"
          fi

          betterleaks git --redact=100 --no-banner --log-opts="${scan_range}" .
